server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = /nl {
    return 301 https://wodiq.nl/;
  }

  location = /nl/ {
    return 301 https://wodiq.nl/;
  }

  location = /nl/privacy {
    return 301 https://wodiq.nl/privacy/;
  }

  location = /nl/privacy/ {
    return 301 https://wodiq.nl/privacy/;
  }

  location = /nl/terms {
    return 301 https://wodiq.nl/terms/;
  }

  location = /nl/terms/ {
    return 301 https://wodiq.nl/terms/;
  }

  location /_astro/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ~* \.(?:svg|png|jpg|jpeg|webp|avif|ico)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location / {
    try_files $uri $uri/ $uri/index.html /index.html;
  }
}
